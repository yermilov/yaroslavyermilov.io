<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Redirecting to yaroslavyermilov.io</title>
    <link rel="canonical" href="https://yaroslavyermilov.io/" />
    <meta name="robots" content="noindex" />
    <meta http-equiv="refresh" content="0; url=https://yaroslavyermilov.io/" />
    <script>
      // Path-preserving redirect for any unknown path on the github.io root
      // (old deep links). Presentation decks at /<name> are served by their own
      // Pages repos and never reach this 404.
      location.replace(
        'https://yaroslavyermilov.io' + location.pathname + location.search + location.hash,
      );
    </script>
  </head>
  <body>
    <p>
      This page has moved to
      <a href="https://yaroslavyermilov.io/">yaroslavyermilov.io</a>.
    </p>
  </body>
</html>
