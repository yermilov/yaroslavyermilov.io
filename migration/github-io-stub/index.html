<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Redirecting to yaroslavyermilov.io</title>
    <link rel="canonical" href="https://yaroslavyermilov.io/" />
    <meta name="robots" content="noindex" />
    <meta http-equiv="refresh" content="0; url=https://yaroslavyermilov.io/" />
    <script>
      // Preserve the path so old deep links (yermilov.github.io/en/blog/foo)
      // land on the same page of the new site. Presentation decks at
      // /<name> are served by their own Pages repos and never reach this stub.
      location.replace(
        'https://yaroslavyermilov.io' + location.pathname + location.search + location.hash,
      );
    </script>
  </head>
  <body>
    <p>
      This site has moved to
      <a href="https://yaroslavyermilov.io/">yaroslavyermilov.io</a>.
    </p>
  </body>
</html>
